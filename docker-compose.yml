services:
  redis:
    image: redis:7-alpine
    container_name: ngenerate_redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]

  backend:
    build: ./backend
    container_name: ngenerate_backend
    restart: unless-stopped
    env_file: ./backend/.env
    ports:
      - "8001:8000"
    volumes:
      - /workspace/ngenerate:/app/storage

    network_mode: "host" 
    depends_on:
      redis:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py runserver 0.0.0.0:8001" 

  celery_default:
    build: ./backend
    network_mode: "host"
    env_file: ./backend/.env
    volumes:
      - /workspace/ngenerate:/app/storage
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A ngenerate worker -Q analysis_queue,upload_queue,fix_text_queue --loglevel=info --concurrency=2

  frontend:
    build: ./frontend
    container_name: ngenerate_frontend
    network_mode: "host"
    restart: unless-stopped
    env_file: ./frontend/.env